<section id="demos">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow">watch</div>
      <h2>Project demos</h2>
      <p class="sub">Short walkthroughs of select projects in action — the result, not the source. Reach out if you'd like to see the code directly.</p>
    </div>

    <div class="grid">
      <div class="card" *ngFor="let v of data.videos">
        <div class="frame">
          <iframe
            *ngIf="embedUrl(v); else placeholder"
            [src]="embedUrl(v)"
            title="{{ v.title }}"
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
          <ng-template #placeholder>
            <div class="placeholder">
              <div class="ring"></div>
              {{ v.embedNote }}
            </div>
          </ng-template>
        </div>
        <div class="info">
          <h3>{{ v.title }}</h3>
          <p>{{ v.description }}</p>
        </div>
      </div>
    </div>

    <p class="note">No source links live in this section by design — it's for showing results, not code.</p>
  </div>
</section>
