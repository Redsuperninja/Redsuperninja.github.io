<section id="skills">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow">stack</div>
      <h2>Skills</h2>
    </div>
    <div class="grid">
      <div class="card" *ngFor="let group of data.skills">
        <h3>{{ group.label }}</h3>
        <div class="chips">
          <span class="chip" *ngFor="let item of group.items">{{ item }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
